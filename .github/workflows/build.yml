name: Build AMCap
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: msbuild amcap.sln /p:Configuration=Release /p:Platform=Win32

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: AMCap-Executable
          path: Release/amcap.exe
